name: AI Loop Controller

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: "Maximum loop iterations"
        required: true
        default: "1"
      mode:
        description: "docs-only | review-only | code"
        required: true
        default: "docs-only"
      dry_run:
        description: "Generate prompts without implementation"
        required: true
        default: "true"
      task_source:
        description: "Roadmap or issue reference"
        required: true
        default: "docs"

jobs:
  controller:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print loop configuration
        run: |
          echo "AI Loop Controller"
          echo "iterations=${{ github.event.inputs.iterations }}"
          echo "mode=${{ github.event.inputs.mode }}"
          echo "dry_run=${{ github.event.inputs.dry_run }}"
          echo "task_source=${{ github.event.inputs.task_source }}"

      - name: Generate next task
        env:
          CTRL_ITERATIONS: ${{ github.event.inputs.iterations }}
          CTRL_MODE: ${{ github.event.inputs.mode }}
          CTRL_DRY_RUN: ${{ github.event.inputs.dry_run }}
          CTRL_TASK_SOURCE: ${{ github.event.inputs.task_source }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ./scripts/ai-loop/generate-next-task.sh \
            "$CTRL_ITERATIONS" \
            "$CTRL_MODE" \
            "$CTRL_DRY_RUN" \
            "$CTRL_TASK_SOURCE"

      - name: Commit and push changes
        if: github.event.inputs.dry_run == 'false'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/ai-loop/NEXT_TASK.md
          if ! git diff --cached --quiet; then
            git commit -m "docs: update NEXT_TASK.md via AI Loop Controller"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Safety reminder
        run: |
          echo "Human review is still required"
